<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - PrimeShield</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0a2540, #0074d9);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:white;
  color:#333;
  padding:30px;
  border-radius:15px;
  width:320px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

h2 { text-align:center; margin-bottom:20px; }

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  background:#0074d9;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover { background:#005fa3; }

a { color:#0074d9; text-decoration:none; }
</style>
</head>

<body>

<div class="container">
<h2>Create Account</h2>

<form id="registerForm">

<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password (min 6 chars)" required>
<input type="text" id="code" placeholder="Registration Code" required>

<!-- TERMS -->
<div style="margin:10px 0; font-size:14px;">
  <input type="checkbox" id="agreeTerms">
  I agree to the <a href="terms.html" target="_blank">Terms & Conditions</a>
</div>

<button type="submit">Register</button>

</form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ✅ YOUR REAL FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAEnNIYafp1h4qRADKi_Kx3RvXMfzxwlP4",
  authDomain: "autoprotection-99453.firebaseapp.com",
  projectId: "autoprotection-99453",
  storageBucket: "autoprotection-99453.firebasestorage.app",
  messagingSenderId: "290645208750",
  appId: "1:290645208750:web:e5015505c4697cc617073f",
  measurementId: "G-BM0YSLWBJG"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// VALID CODES
const validCodes = ["PRIME123", "PRIME456", "PRIME789"];

document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const code = document.getElementById("code").value;
  const agree = document.getElementById("agreeTerms").checked;

  // ✅ Terms check
  if (!agree) {
    alert("You must agree to the Terms & Conditions.");
    return;
  }

  // ✅ Password validation
  if (password.length < 6) {
    alert("Password must be at least 6 characters.");
    return;
  }

  // ✅ Code validation
  if (!validCodes.includes(code)) {
    alert("Invalid registration code.");
    return;
  }

  try {
    await createUserWithEmailAndPassword(auth, email, password);

    alert("Account created successfully!");
    window.location.href = "dashboard.html";

  } catch (error) {
    alert(error.message);
  }

});
</script>

</body>
</html>
