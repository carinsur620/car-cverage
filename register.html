<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PrimeShield Register</title>
<style>
body { font-family: Arial; background:#f4f7fb; }
.register-box {
  width: 350px; margin: 50px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
input { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:1px solid #ccc; }
button { width:100%; padding:10px; background:#0074d9; color:white; border:none; border-radius:6px; cursor:pointer; }
button:hover { background:#005fa3; }
</style>
</head>
<body>

<div class="register-box">
  <h2>Register</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password (min 8 chars)">
  <input type="text" id="registerCode" placeholder="Enter registration code">
  <button id="registerBtn">Register</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCdGGUFIkocZmDcqb-lPPOzJiGC8nn5uYw",
  authDomain: "primeshield-77a71.firebaseapp.com",
  projectId: "primeshield-77a71",
  storageBucket: "primeshield-77a71.firebasestorage.app",
  messagingSenderId: "798331956070",
  appId: "1:798331956070:web:4bed3f735e655c3cc1b6a7"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("registerBtn").onclick = async function() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const code = document.getElementById("registerCode").value.trim();

  // ✅ Validation
  if (!email || !password || !code) {
    alert("Please fill in all fields.");
    return;
  }

  // Email format check
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailPattern.test(email)) {
    alert("Please enter a valid email address.");
    return;
  }

  // Password length check
  if (password.length < 8) {
    alert("Password must be at least 8 characters.");
    return;
  }

  // Register code check
  if (code !== "PRIME123") {
    alert("Invalid registration code. Make sure you purchased a plan.");
    return;
  }

  try {
    // Create user in Firebase Auth
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    // Save user data in Firestore
    await setDoc(doc(db, "users", email), {
      purchased: true,
      email: email,
      planCode: code,
      createdAt: new Date()
    });

    alert("Registration successful! Redirecting to dashboard...");
    window.location.href = "dashboard.html"; // replace with your dashboard page

  } catch (error) {
    alert(error.message);
  }
};
</script>

</body>
</html>
