<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register – PrimeShield</title>
<style>
body { font-family:Arial,sans-serif; background:#f0f4f8; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
form { background:white; padding:40px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.2); width:350px; }
form h2 { margin-bottom:20px; text-align:center; color:#0074d9; }
form input { width:100%; padding:12px 15px; margin:10px 0; border-radius:8px; border:1px solid #ccc; }
form button { width:100%; padding:12px; background:#0074d9; color:white; border:none; border-radius:8px; cursor:pointer; font-size:16px; }
form button:hover { background:#005fa3; }
</style>
</head>
<body>

<form id="registerForm">
<h2>Register Your Account</h2>
<input type="text" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password (min 6 chars)" required minlength="6">
<input type="text" id="regCode" placeholder="Registration Code" required readonly>
<button type="submit">Register</button>
</form>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCdGGUFIkocZmDcqb-lPPOzJiGC8nn5uYw",
  authDomain: "primeshield-77a71.firebaseapp.com",
  projectId: "primeshield-77a71",
  storageBucket: "primeshield-77a71.appspot.com",
  messagingSenderId: "798331956070",
  appId: "1:798331956070:web:4bed3f735e655c3cc1b6a7"
};
const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Fill registration code from URL
const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get('code');
if(code) document.getElementById('regCode').value = code;

// Register Form
document.getElementById('registerForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const regCode = document.getElementById('regCode').value;
  if(!regCode) return alert('Registration code is required!');
  try{
    await auth.createUserWithEmailAndPassword(email,password);
    alert('Registration successful! You can now log in.');
    window.location.href = "login.html";
  }catch(err){
    alert(err.message);
  }
});
</script>

</body>
</html>
