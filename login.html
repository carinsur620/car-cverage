<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PrimeShield</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0a2540, #0074d9);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box {
  background:white;
  color:#333;
  padding:30px;
  border-radius:15px;
  width:320px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

h2 { text-align:center; margin-bottom:20px; }

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  background:#0074d9;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover { background:#005fa3; }
</style>
</head>

<body>

<div class="box">
<h2>Customer Login</h2>

<form id="loginForm">
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEnNIYafp1h4qRADKi_Kx3RvXMfzxwlP4",
  authDomain: "autoprotection-99453.firebaseapp.com",
  projectId: "autoprotection-99453",
  appId: "1:290645208750:web:e5015505c4697cc617073f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please fill in all fields.");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "dashboard.html";
  } catch (error) {
    alert("Invalid email or password.");
  }
});
</script>

</body>
</html>
