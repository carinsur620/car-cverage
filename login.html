<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PrimeShield Login & Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f4f8; margin:0; padding:0; color:#333; }
        header { background-color: #0074d9; color: white; padding: 20px; text-align: center; }
        h1, h2 { margin: 0; }
        #loginForm, #dashboard { max-width: 900px; margin: 30px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        input { display:block; width: 100%; padding: 10px; margin: 10px 0; border-radius:5px; border:1px solid #ccc; }
        button { padding: 10px 20px; background:#0074d9; color:white; border:none; border-radius:5px; cursor:pointer; }
        button:hover { background:#005fa3; }
        iframe { width: 100%; height: 700px; border-radius:8px; border:1px solid #ccc; margin-top:20px; }
        footer { text-align: center; padding: 10px; margin-top:30px; color: #555; }
    </style>
</head>
<body>

<header>
    <h1>PrimeShield</h1>
    <p>Secure Customer Area</p>
</header>

<!-- 🔹 Login Form -->
<div id="loginForm">
    <h2>Customer Login</h2>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button id="loginBtn">Log In</button>
</div>

<!-- 🔹 Dashboard (hidden initially) -->
<div id="dashboard" style="display:none;">
    <h2>Welcome to Your Dashboard</h2>
    <p>Only paying customers can see this area. Submit your claim below:</p>

    <!-- JotForm Claims Form -->
    <iframe src="https://form.jotform.com/260765348355061" title="PrimeShield Claims Form"></iframe>
</div>

<footer>
    <p>&copy; 2026 PrimeShield</p>
</footer>

<script type="module">
    // 🔹 Firebase imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔹 Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCdGGUFIkocZmDcqb-lPPOzJiGC8nn5uYw",
      authDomain: "primeshield-77a71.firebaseapp.com",
      projectId: "primeshield-77a71",
      storageBucket: "primeshield-77a71.firebasestorage.app",
      messagingSenderId: "798331956070",
      appId: "1:798331956070:web:4bed3f735e655c3cc1b6a7",
      measurementId: "G-M6P8PK8JVL"
    };

    // 🔹 Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById("loginForm");
    const dashboard = document.getElementById("dashboard");

    // 🔹 Login function
    async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            await signInWithEmailAndPassword(auth, email, password);

            // Check if user purchased a plan
            const userDoc = await getDoc(doc(db, "users", email));
            if (userDoc.exists() && userDoc.data().purchased) {
                // Hide login, show dashboard
                loginForm.style.display = "none";
                dashboard.style.display = "block";
            } else {
                alert("You need to purchase a plan first!");
            }
        } catch (error) {
            alert("Invalid login: " + error.message);
        }
    }

    document.getElementById("loginBtn").onclick = login;

    // 🔹 Keep user logged in and show dashboard if already authenticated
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.email));
            if (userDoc.exists() && userDoc.data().purchased) {
                loginForm.style.display = "none";
                dashboard.style.display = "block";
            } else {
                loginForm.style.display = "block";
                dashboard.style.display = "none";
            }
        } else {
            loginForm.style.display = "block";
            dashboard.style.display = "none";
        }
    });
</script>

</body>
</html>
