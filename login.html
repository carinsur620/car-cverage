<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PrimeShield Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0074d9, #00aaff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #0074d9;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0074d9;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #005fa3;
        }

        #dashboard {
            display: none;
            margin-top: 20px;
        }

        iframe {
            width: 100%;
            height: 600px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .link {
            margin-top: 10px;
            display: block;
            color: #0074d9;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container" id="loginBox">
    <h2>Customer Login</h2>

    <input type="email" id="email" placeholder="Enter your email">
    <input type="password" id="password" placeholder="Enter your password">

    <button id="loginBtn">Log In</button>

    <a href="register.html" class="link">Create Account</a>
</div>

<!-- 🔥 Dashboard -->
<div class="container" id="dashboard">
    <h2>Welcome to Your Dashboard</h2>
    <p>Submit your claim below:</p>

    <iframe src="https://form.jotform.com/260765348355061"></iframe>
</div>

<!-- 🔥 FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔹 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCdGGUFIkocZmDcqb-lPPOzJiGC8nn5uYw",
  authDomain: "primeshield-77a71.firebaseapp.com",
  projectId: "primeshield-77a71",
  storageBucket: "primeshield-77a71.firebasestorage.app",
  messagingSenderId: "798331956070",
  appId: "1:798331956070:web:4bed3f735e655c3cc1b6a7",
  measurementId: "G-M6P8PK8JVL"
};

// 🔹 Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginBox = document.getElementById("loginBox");
const dashboard = document.getElementById("dashboard");

// 🔹 Login function
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        await signInWithEmailAndPassword(auth, email, password);

        // 🔐 Check purchase
        const userDoc = await getDoc(doc(db, "users", email));

        if (userDoc.exists() && userDoc.data().purchased) {
            loginBox.style.display = "none";
            dashboard.style.display = "block";
        } else {
            alert("You must purchase a plan first.");
        }

    } catch (error) {
        alert("Login failed: " + error.message);
    }
}

// 🔹 Button click
document.getElementById("loginBtn").onclick = login;

// 🔹 Keep user logged in
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const userDoc = await getDoc(doc(db, "users", user.email));

        if (userDoc.exists() && userDoc.data().purchased) {
            loginBox.style.display = "none";
            dashboard.style.display = "block";
        }
    }
});

</script>

</body>
</html>
